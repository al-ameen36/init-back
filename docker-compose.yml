services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - .env
    # Reach Memgraph by service name inside the compose network.
    environment:
      - MEMGRAPH_URI=bolt://memgraph:7687
    depends_on:
      - memgraph
    restart: unless-stopped

  memgraph:
    image: memgraph/memgraph:latest
    ports:
      - "7687:7687"
    # IN_MEMORY_TRANSACTIONAL is the default; mount a volume for durability.
    volumes:
      - memgraph_data:/var/lib/memgraph
    restart: unless-stopped

volumes:
  memgraph_data:
